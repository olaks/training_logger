name: training_logger
description: Climbing training logger — Android, iOS, Web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database (SQLite, works on Android/iOS/Web)
  drift: ^2.18.0
  drift_flutter: ^0.3.0

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation (URL-based — important for web)
  go_router: ^17.2.0

  # Charts
  fl_chart: ^1.2.0

  # Calendar widget
  table_calendar: ^3.1.2

  # Date formatting
  intl: ^0.20.2

  # Image picking (gallery + camera, works on Android/iOS/Web)
  image_picker: ^1.1.0

  # File picking for CSV import
  file_picker: ^8.0.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
