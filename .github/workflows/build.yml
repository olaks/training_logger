name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Required for GitHub Pages deployment and creating releases
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Android APK ────────────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up signing key
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > flutter_app/android/app/release-keystore.jks
          cat > flutter_app/android/key.properties <<-EOK
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=release
          storeFile=release-keystore.jks
          EOK
          sed -i 's/^[[:space:]]*//' flutter_app/android/key.properties

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-logger-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  # ── Linux desktop ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Linux release
        working-directory: flutter_app
        run: flutter build linux --release

      - name: Zip bundle
        run: |
          cd flutter_app/build/linux/x64/release
          zip -r training-logger-linux.zip bundle/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-logger-linux
          path: flutter_app/build/linux/x64/release/training-logger-linux.zip
          retention-days: 90

  # ── Web → GitHub Pages ─────────────────────────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build web
        working-directory: flutter_app
        # base-href must match the GitHub Pages sub-path /training_logger/
        run: flutter build web --release --base-href /training_logger/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-apk, build-linux]
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: training-logger-apk
          path: dist/

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: training-logger-linux
          path: dist/

      - name: Delete existing 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes --repo "$GH_REPO" 2>/dev/null || true
          git -c advice.detachedHead=false clone --depth 1 "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" _repo
          cd _repo && git tag -d latest 2>/dev/null || true
          gh api -X DELETE /repos/"$GH_REPO"/git/refs/tags/latest 2>/dev/null || true

      - name: Create 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --repo "${{ github.repository }}" \
            --title "Latest build" \
            --notes "Built from \`main\` — commit ${{ github.sha }}" \
            --prerelease \
            dist/app-release.apk#training-logger.apk \
            dist/training-logger-linux.zip#training-logger-linux.zip
