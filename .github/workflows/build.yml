name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Android APK ────────────────────────────────────────────────────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: training-logger-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  # ── Linux desktop ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Linux release
        working-directory: flutter_app
        run: flutter build linux --release

      - name: Zip bundle
        run: |
          cd flutter_app/build/linux/x64/release
          zip -r training-logger-linux.zip bundle/

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: training-logger-linux
          path: flutter_app/build/linux/x64/release/training-logger-linux.zip
          retention-days: 90

  # ── Web → GitHub Pages ─────────────────────────────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build web
        working-directory: flutter_app
        # base-href must match the GitHub Pages sub-path /training_logger/
        run: flutter build web --release --base-href /training_logger/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
